<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Registro de Gastos</title>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="header">

        <h1>Finanzas Web</h1>

    </div>

    <div class="container">

        <h2>Registro de Gastos</h2>

        <form action="registrar-gasto" method="post">

            <label>Descripción</label>

            <input
                    type="text"
                    name="descripcion"
                    required>

            <label>Categoría</label>

            <input
                    type="text"
                    name="categoria"
                    required>

            <label>Monto</label>

            <input
                    type="number"
                    name="monto"
                    step="0.01"
                    required>

            <button type="submit">

                Registrar Gasto

            </button>

        </form>

        <br>

        <div style="margin-top:20px;">
    <a href="listar-gastos">
        Consultar gastos registrados
    </a>
</div>

    </div>

</body>

</html>
